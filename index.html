<!DOCTYPE html>
<html>
<head>
<title>Upload Payment Screenshot</title>
<style>
body{background:#111;color:#fff;text-align:center;font-family:Arial}
.container{margin-top:50px}
input,button{padding:10px;margin:10px;border:none;border-radius:5px}
button{background:orange}
</style>
</head>

<body>

<div class="container">
<h2>📸 Upload Payment Screenshot</h2>

<input type="text" id="mobile" placeholder="Enter Mobile Number"><br>
<input type="file" id="file"><br>

<button onclick="upload()">Upload Screenshot</button>

<p id="msg"></p>
</div>

<script>
function upload(){
  const file = document.getElementById("file").files[0];
  const mobile = document.getElementById("mobile").value;

  if(!file || !mobile){
    alert("Fill all fields");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(){

    const data = {
      mobile: mobile,
      screenshot: reader.result
    };

    await fetch("https://script.google.com/macros/s/AKfycbx6QhD-FU3bB0dfKZbzFMElj6StJHP9vs9NpK00EmmWcSiZ9lh9FJbU9IctYzk1PC6Brg/exec", {
      method: "POST",
      body: JSON.stringify(data)
    });

    document.getElementById("msg").innerText = "✅ Uploaded Successfully";
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
